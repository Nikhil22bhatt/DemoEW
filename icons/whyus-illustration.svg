<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 300" fill="none" role="img" aria-label="A protective umbrella sheltering a family">
  <defs>
    <linearGradient id="wu-umb" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0d3594"/>
      <stop offset="1" stop-color="#35d3e1"/>
    </linearGradient>
  </defs>

  <!-- ground -->
  <ellipse cx="160" cy="272" rx="120" ry="12" fill="#1a3668" opacity="0.08"/>

  <!-- umbrella canopy -->
  <path d="M160 40 C110 40 66 74 58 118 C58 122 62 124 66 122 C86 108 96 108 116 122 C120 124 124 124 128 122 C146 108 174 108 192 122 C196 124 200 124 204 122 C224 108 234 108 254 122 C258 124 262 122 262 118 C254 74 210 40 160 40 Z" fill="url(#wu-umb)"/>
  <!-- canopy tip -->
  <circle cx="160" cy="40" r="5" fill="#1a3668"/>
  <!-- pole -->
  <rect x="157" y="44" width="6" height="150" rx="3" fill="#1a3668"/>
  <!-- handle -->
  <path d="M160 194 C160 210 148 214 140 206" stroke="#1a3668" stroke-width="6" stroke-linecap="round"/>

  <!-- family under umbrella: two adults + child (simple flat figures) -->
  <!-- adult 1 -->
  <circle cx="128" cy="176" r="14" fill="#1a3668"/>
  <path d="M108 240 C108 214 118 200 128 200 C138 200 148 214 148 240 Z" fill="#3e7bd4"/>
  <!-- adult 2 -->
  <circle cx="196" cy="176" r="14" fill="#1a3668"/>
  <path d="M176 240 C176 214 186 200 196 200 C206 200 216 214 216 240 Z" fill="#35d3e1"/>
  <!-- child -->
  <circle cx="162" cy="196" r="10" fill="#1a3668"/>
  <path d="M148 244 C148 226 154 216 162 216 C170 216 176 226 176 244 Z" fill="#3e7bd4"/>
</svg>
